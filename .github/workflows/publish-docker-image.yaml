name: publish-docker-image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag"
        required: false
        default: "latest"
  workflow_call:
    inputs:
      tag:
        type: string
        description: "Docker image tag"
        required: false
        default: "latest"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push Docker image (multi-platform)
        id: build-main
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: quay.io/unmold/unmold-cli:${{ inputs.tag}}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push CI image (multi-platform)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile-ci
          push: true
          pull: true
          build-args: |
            BASE_IMAGE=quay.io/unmold/unmold-cli@${{ steps.build-main.outputs.digest }}
          tags: quay.io/unmold/unmold-cli:${{ inputs.tag}}-ci
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
